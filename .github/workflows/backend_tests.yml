name: Backend Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'alembic/**'
      - 'requirements*.txt'
      - 'pytest.ini'
  pull_request:
    branches: [main, master]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'alembic/**'
      - 'requirements*.txt'
      - 'pytest.ini'
  workflow_dispatch:

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cellen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/cellen_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/cellen_test
      SECRET_KEY: test-secret-key-not-for-production-use-only
      PLATFORM_ADMIN_EMAIL: admin@cellen.app
      PLATFORM_ADMIN_PASSWORD: admin1234

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
