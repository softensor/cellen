name: Flutter Build

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'mobile/**'
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Android APK + AAB
  # ─────────────────────────────────────────────
  build-android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - name: Create Android platform files
        working-directory: mobile
        run: flutter create . --project-name cellen --org com.cellen --platforms android

      - name: Set compileSdk to 36 for app and all plugins
        working-directory: mobile
        run: |
          sed -i 's/compileSdk = .*/compileSdk = 36/' android/app/build.gradle.kts
          # Force compileSdk 36 on all plugin subprojects (e.g. file_picker uses 34)
          cat >> android/build.gradle.kts <<'PATCH'

          allprojects {
              plugins.withType<com.android.build.gradle.BasePlugin> {
                  extensions.configure<com.android.build.gradle.BaseExtension> {
                      compileSdkVersion(36)
                  }
              }
          }
          PATCH

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build APK (debug)
        working-directory: mobile
        run: flutter build apk --debug

      - name: Build AAB (release)
        working-directory: mobile
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            mobile/build/app/outputs/flutter-apk/app-debug.apk
            mobile/build/app/outputs/bundle/release/app-release.aab

  # ─────────────────────────────────────────────
  # iOS IPA
  # ─────────────────────────────────────────────
  build-ios:
    name: iOS
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - name: Create iOS platform files
        working-directory: mobile
        run: flutter create . --project-name cellen --org com.cellen --platforms ios

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build iOS (no codesign)
        working-directory: mobile
        run: flutter build ios --release --no-codesign
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: mobile/build/ios/iphoneos/Runner.app

  # ─────────────────────────────────────────────
  # Web — build + deploy to GitHub Pages
  # ─────────────────────────────────────────────
  build-web:
    name: Web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - name: Create web platform files
        working-directory: mobile
        run: flutter create . --project-name cellen --org com.cellen --platforms web

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build web
        working-directory: mobile
        # base-href must match the repo path on GitHub Pages: /<repo-name>/
        run: |
          flutter build web --release \
            --base-href /${{ github.event.repository.name }}/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/build/web/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        # Only deploy on push to main/master, not on PRs
        if: github.event_name != 'pull_request'
        continue-on-error: true
